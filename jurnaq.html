<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жұрнақтар мен сөзалды қосымша түрлендіргіш</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        textarea {
            width: 95%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .output {
            margin-top: 20px;
            padding: 10px;
            background: #e9f7ef;
            border: 1px solid #d4edda;
            border-radius: 4px;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Сөзсоңы мен Сөзалды қосымшаларын түрлендіргішв</h1>
        <textarea id="inputText" placeholder="Орысша сөз жаз..."></textarea>
        <button onclick="convertWord()">Түрлендіру</button>
        <button onclick="clearFields()">Өшіру</button>
        <div id="output" class="output"></div>
    </div>

    <script>
        const rules = [
            
        { pattern: /^авто/, replacement: "өз" },
    { pattern: /^анти, replacement: "қарсы" },
    { pattern: /^атмос/, replacement: "бу" },
    
    { pattern: /^аэро/, replacement: "ауа" },
    { pattern: /^био/, replacement: "өмір" },
    { pattern: /^гидро/, replacement: "су" },
    { pattern: /^гипер/, replacement: "аса" },
    { pattern: /^гипо/, replacement: "төмен" },
    { pattern: /^гео/, replacement: "жер" },
    { pattern: /^изо/, replacement: "тең" },
    { pattern: /^интер/, replacement: "ара" },
    { pattern: /^ихтио/, replacement: "балық" },
    { pattern: /^калли/, replacement: "сұлу" },
    { pattern: /^ксило/, replacement: "ағаш" },
    { pattern: /^контр/, replacement: "қарсы" },
    { pattern: /^лито/, replacement: "тас" },
    { pattern: /^макро/, replacement: "ұлы" },
    { pattern: /^микро/, replacement: "кіші" },
    { pattern: /^моно/, replacement: "бір" },
    { pattern: /^над/, replacement: "үсті" },
    { pattern: /^орфо/, replacement: "дұрыс" },
    { pattern: /^пере/, replacement: "қайта" },
    { pattern: /^поли/, replacement: "көп" },
    { pattern: /^порно/, replacement: "бүлік" },
    { pattern: /^само/, replacement: "өз" },
    { pattern: /^термо/, replacement: "жылы" },
    { pattern: /^теле/, replacement: "алыс" },
    { pattern: /^типо/, replacement: "мөр" },
    { pattern: /^томо/, replacement: "кесік" },
    { pattern: /^топо/, replacement: "орын" },
    { pattern: /^фоно/, replacement: "үн" },
    { pattern: /^фото/, replacement: "жарық" },
    { pattern: /^хорео/, replacement: "би" },
    { pattern: /^этно/, replacement: "ел" },

    //-------------СОҢЫ-------------------

    { pattern: /графия$/, replacement: "жазба" },
    { pattern: /ение$/, replacement: "у" },
    { pattern: /лог$/, replacement: "танушы" },
    { pattern: /логия$/, replacement: "тану" },
    { pattern: /метрия$/, replacement: "өлшем" },
    { pattern: /сфера$/, replacement: "шеңбер" },


    
    { pattern: /ость$/, replacement: "лық" },
    { pattern: /ство$/, replacement: "шылық" }


            
        ];

        function convertWord() {
            const inputText = document.getElementById("inputText").value.trim();
            let result = inputText;

            for (const rule of rules) {
                if (rule.pattern.test(result)) {
                    result = result.replace(rule.pattern, rule.replacement);
                }
            }

            document.getElementById("output").innerText = result || "Түрлендіру үшін сөз енгіз.";
        }

        function clearFields() {
            document.getElementById("inputText").value = "";
            document.getElementById("output").innerText = "";
        }
    </script>
</body>
</html>
