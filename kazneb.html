<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Images and Create PDF</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        textarea {
            width: 100%;
            height: 200px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Download Images and Create PDF</h1>
        <textarea id="scriptTextarea"></textarea>
        <button onclick="processImages()">Download and Create PDF</button>
    </div>

    <script>
        async function processImages() {
            const scriptContent = document.getElementById('scriptTextarea').value;
            const pattern = /pages.push\("(.*?)"\);/g;
            const baseUrl = 'https://kazneb.kz';
            const matches = scriptContent.matchAll(pattern);
            const urls = Array.from(matches).map(match => baseUrl + match[1].replace(/&amp;/g, '&'));
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                const response = await fetch(url);
                const blob = await response.blob();
                const img = await loadImage(blob);

                if (i > 0) {
                    pdf.addPage();
                }
                pdf.addImage(img, 'PNG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
            }

            pdf.save('downloaded_images.pdf');
        }

        function loadImage(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = event.target.result;
                };
                reader.onerror = () => reject(new Error('Failed to read blob'));
                reader.readAsDataURL(blob);
            });
        }
    </script>
</body>
</html>
