<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qazaq Grammar Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Qazaq Grammar Könverter</h2>

  <label for="kazakhText">Qazaqca söz jaz:</label>
  <textarea id="kazakhText"></textarea>

  <input type="file" id="fileInput">
  <button onclick="loadAdditionalWords()">Файлды жүктеу</button>
  <button onclick="transliterate()">Säykestew</button>
  <button onclick="deleteText()">Öciriw</button>
  <button onclick="copyText()">Köciriw</button>

  <label for="latinText">Latin Transliteration:</label>
  <textarea id="latinText" readonly></textarea>

  <script>
    let additionalWords = [];

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        additionalWords = e.target.result.trim().split('\n').map(line => {
          const [kazakh, latin] = line.split(':');
          return { kazakh, latin };
        });
      };
      reader.readAsText(file);
    });

    function loadAdditionalWords() {
      // В данном случае функция ничего не делает, так как обработка файла происходит в событии change для input type="file"
    }

    function transliterate() {
      const kazakhText = document.getElementById('kazakhText').value;
      const latinText = converter(kazakhText, qazaqGrammarAlphabet);
      document.getElementById('latinText').value = latinText;
    }

    function deleteText() {
      document.getElementById('kazakhText').value = '';
      document.getElementById('latinText').value = '';
    }

    function copyText() {
      const latinText = document.getElementById('latinText');
      latinText.select();
      document.execCommand('copy');
    }

    function converter(str, alphabet) {
      const { characters, exceptions = [] } = alphabet;
      if (typeof str === 'string') {

        let latin = str;

        latin = latin.replace(/\S+/ig, word => {
          let w = word;
          const keys = Object.keys(exceptions);
          for (let i = 0, ii = keys.length; i < ii; i++) {
            w = w.replace(new RegExp(keys[i], 'ig'), exceptions[keys[i]]);
          }
          return w;
        });

        latin = latin.replace(/[А-Яа-яӘәІіҢңҒғҮүҰұҚқӨөҺһ]/gi, (l) => {
          return characters[l] ? characters[l] : l;
        });

        return latin;
      }
    }

    const qazaqGrammarAlphabet = {
        "name": "qazaqGrammar",
         "characters": {
        "А": "A",
	"Ә": "Ä",
	"Б": "B",
	"Д": "D",
	"Е": "E",
	"Ф": "F",
	"Г": "G",
	"Ғ": "Ğ",
	"Һ": "H",
	"Х": "H",
	"І": "İ",
	"И": "İy",
	"Й": "Ү",
	"Ж": "J",
	"К": "K",
	"Л": "L",
	"М": "M",
	"Н": "N",
	"Ң": "Ñ",
	"О": "O",
	"Ө": "Ö",
	"П": "P",
	"Қ": "Q",
	"Р": "R",
	"С": "S",
	"Ш": "C",
	"Ч": "C",
	"Т": "T",
	"Ұ": "U",
	"Ү": "Ü",
	"В": "V",
	"Ы": "I",
	"У": "Iw",
	"З": "Z",
	"а": "a",
	"ә": "ä",
	"б": "b",
	"д": "d",
	"е": "e",
	"ф": "f",
	"г": "g",
	"ғ": "ğ",
	"һ": "h",
	"х": "h",
	"і": "i",
	"и": "iy",
	"й": "y",
	"ж": "j",
	"к": "k",
	"л": "l",
	"м": "m",
	"н": "n",
	"ң": "ñ",
	"о": "o",
	"ө": "ö",
	"п": "p",
	"қ": "q",
	"р": "r",
	"с": "s",
	"ш": "c",
	"ч": "c",
	"т": "t",
	"ұ": "u",
	"ү": "ü",
	"в": "v",
	"ы": "ı",
	"у": "ıw",
	"з": "z",
	"Я": "Ya",
	"я":"ya",
	"Ю": "Yw",
	"ю":"yw",
	"Э":"E",
	"э":"e",
	"Щ":"C",
	"щ":"c",
	"Ч":"C",
	"ч":"с",
	"Ц":"S",
	"ц":"s",
	"Ь":"",
	"ь":"",
	"Ъ":"",
	"ъ":""
  },
  "exceptions": {
	"у(?=.*[вэфцчщ])":"u",
	"([вэфцчщ].*)у": "$1u",
	"([аәоеыіоөұү])у":"$1w",
	"^([^аәоеыіоөұуү])?у": "$1uw",
	"([әеиөүік]+[^аәоеыіоөұү]*?)у":"$1iw",
	"и(?=.*[вэхфцчщ])":"i",
	"и(?=.*[я])":"ı",
	"([вэхфцчщ].*)и": "$1i",
	"([аоуұық]+[^аәоеыіоөұуү]*?)и":"$1ıy",
	"и(?=([^аәоеыіоөұуү]*?[аоуұы]))":"ıy",
    
    "([қ]+[^аәоеыіоөұуү]*?)ю":"$1ıw",

     "([и]+[ю])":"iyiw",
      "([а]+[ю])" :"ayıw",
      "([о]+[ю])":"oyıw",
      "([ы]+[ю])":"ıyıw",
      "(і]+[ю])":"iyiw",
      "([е]+[ю])":"eyiw",
      "([ұ]+[ю])":"uyıw",
      "([ү]+[ю])":"üyiw",


     "([қ]+[а]+[й]+[т]+[у]+[ы])":"qaytıwı",
      "([қ]+[а]+[й]+[т]+[у]+[і])":"qaytiwi",

   
      "([а]+[щ]+[ы])":"accı",
       "([т]+[ұ]+[щ]+[ы])":"tuccı",
       "«":"“",
       "»":"”",
      //'компьютер':'kompiter',
     
     
       //'компьютер':'kompiter'
      //'модель':'mödel',
     // 'моль':'möl',
     
       
  }
};

    
    // Добавить дополнительные слова из файла в объект алфавита
    additionalWords.forEach(word => {
      qazaqGrammarAlphabet.characters[word.kazakh] = word.latin;
    });
  </script>

</body>
</html>
